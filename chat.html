<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>AI 진단 · 웰컴법률사무소</title>
<link href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css" rel="stylesheet">
<style>
  :root{
    --bg-0:#0B0913; --bg-1:#161320; --bg-2:#1C182B;
    --purple-bright:#6529FF; --cyan:#00B8FF; --mint:#1EF5CA;
    --text:#F5F5FA; --text-dim:#A7A7A7;
    --border:rgba(255,255,255,.08);
    --card:rgba(255,255,255,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,system-ui,sans-serif;
    background:var(--bg-0); color:var(--text);
    letter-spacing:-0.03em; -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  body::before{
    content:'';position:fixed;inset:-20%;z-index:0;
    background:
      radial-gradient(50% 40% at 20% 10%,rgba(101,41,255,.35),transparent 70%),
      radial-gradient(50% 40% at 80% 90%,rgba(0,184,255,.25),transparent 70%),
      radial-gradient(40% 40% at 50% 50%,rgba(30,245,202,.12),transparent 70%);
    filter:blur(80px);pointer-events:none;
  }
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

  .app{
    position:relative;z-index:1;
    display:flex;flex-direction:column;
    height:100vh;max-width:820px;margin:0 auto;
  }

  /* Header */
  .chat-header{
    display:flex;align-items:center;gap:14px;
    padding:16px 20px;
    border-bottom:1px solid var(--border);
    backdrop-filter:blur(14px);
    background:rgba(11,9,19,.55);
  }
  .back{
    width:36px;height:36px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    background:var(--card);border:1px solid var(--border);
    font-size:18px;
  }
  .avatar{
    width:44px;height:44px;border-radius:50%;
    background:linear-gradient(135deg,var(--purple-bright),var(--cyan));
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:14px;color:#0B0913;
    box-shadow:0 0 0 2px rgba(30,245,202,.3);
  }
  .h-title{flex:1;min-width:0;}
  .h-title .name{font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint);}
  .h-title .sub{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .settings{
    padding:8px 12px;border-radius:10px;
    background:var(--card);border:1px solid var(--border);
    font-size:11px;color:var(--text-dim);
  }

  /* Disclaimer */
  .disclaimer{
    margin:12px 20px 0;padding:10px 14px;
    border-radius:12px;font-size:11px;line-height:1.5;
    background:rgba(255,180,0,.06);
    border:1px solid rgba(255,180,0,.2);
    color:#FFD591;
  }

  /* Messages */
  .messages{
    flex:1;overflow-y:auto;
    padding:20px;display:flex;flex-direction:column;gap:14px;
    scroll-behavior:smooth;
  }
  .messages::-webkit-scrollbar{width:6px;}
  .messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}

  .msg{max-width:85%;display:flex;gap:10px;animation:fadeIn .4s ease-out;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .msg.user{align-self:flex-end;flex-direction:row-reverse;}
  .msg .bubble{
    padding:14px 18px;border-radius:18px;
    font-size:14.5px;line-height:1.65;
    word-wrap:break-word;white-space:pre-wrap;
  }
  .msg.bot .bubble{
    background:var(--card);
    border:1px solid var(--border);
    backdrop-filter:blur(10px);
    border-top-left-radius:4px;
  }
  .msg.user .bubble{
    background:linear-gradient(135deg,var(--purple-bright),var(--cyan));
    color:#0B0913;font-weight:600;
    border-top-right-radius:4px;
  }
  .msg .bubble pre{
    margin-top:10px;padding:12px;border-radius:10px;
    background:rgba(0,0,0,.4);border:1px solid var(--border);
    font-size:11px;line-height:1.5;color:var(--mint);
    font-family:ui-monospace,'SF Mono',Consolas,monospace;
    overflow-x:auto;white-space:pre;
  }
  .msg .bubble b{color:var(--mint);font-weight:700;}
  .mini-avatar{
    width:32px;height:32px;border-radius:50%;flex-shrink:0;
    background:linear-gradient(135deg,var(--purple-bright),var(--cyan));
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:800;color:#0B0913;
  }

  .typing{display:flex;gap:4px;padding:4px 2px;}
  .typing span{
    width:7px;height:7px;border-radius:50%;background:var(--text-dim);
    animation:blink 1.4s infinite;
  }
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,60%,100%{opacity:.3;}30%{opacity:1;}}

  /* Input */
  .composer{
    padding:14px 20px 20px;
    border-top:1px solid var(--border);
    background:rgba(11,9,19,.7);
    backdrop-filter:blur(14px);
  }
  .composer form{
    display:flex;gap:10px;align-items:flex-end;
    background:var(--card);border:1px solid var(--border);
    border-radius:20px;padding:8px 8px 8px 18px;
    transition:border .2s;
  }
  .composer form:focus-within{border-color:rgba(0,184,255,.5);}
  .composer textarea{
    flex:1;background:none;border:none;outline:none;
    color:var(--text);font-family:inherit;font-size:14.5px;
    resize:none;max-height:140px;min-height:24px;
    line-height:1.5;padding:8px 0;
  }
  .composer textarea::placeholder{color:var(--text-dim);}
  .send-btn{
    width:40px;height:40px;border-radius:50%;
    background:linear-gradient(135deg,var(--purple-bright),var(--cyan));
    color:#0B0913;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:transform .15s,opacity .15s;
  }
  .send-btn:disabled{opacity:.3;cursor:not-allowed;}
  .send-btn:not(:disabled):hover{transform:scale(1.08);}
  .composer .hint{font-size:10px;color:var(--text-dim);text-align:center;margin-top:8px;}

  /* Interactive checkboxes inside bot bubbles */
  .cb-item{
    display:flex;align-items:center;gap:10px;
    padding:10px 14px;margin:4px 0;border-radius:10px;
    background:rgba(255,255,255,.03);
    border:1px solid var(--border);
    cursor:pointer;transition:all .15s;
    font-size:14px;line-height:1.4;
  }
  .cb-item:hover{background:rgba(255,255,255,.06);border-color:var(--border-strong,rgba(255,255,255,.14));}
  .cb-item input[type=checkbox]{
    width:18px;height:18px;flex-shrink:0;accent-color:var(--mint);
    cursor:pointer;margin:0;
  }
  .cb-item.checked{
    background:rgba(30,245,202,.08);
    border-color:rgba(30,245,202,.35);
  }
  .cb-item.disabled{opacity:.55;pointer-events:none;}
  .cb-group-title{
    font-size:13px;font-weight:800;color:var(--mint);
    margin:14px 0 6px;letter-spacing:-0.02em;
  }
  .cb-submit{
    display:block;width:100%;margin-top:14px;padding:14px;
    border-radius:12px;font-size:14px;font-weight:800;
    background:linear-gradient(90deg,var(--purple-bright),var(--cyan),var(--mint));
    color:#0B0913;letter-spacing:-0.02em;
    transition:transform .15s,opacity .15s;
  }
  .cb-submit:hover{transform:translateY(-1px);}
  .cb-submit:disabled{opacity:.4;cursor:not-allowed;transform:none;}

  /* Key modal */
  .modal-backdrop{
    position:fixed;inset:0;z-index:100;
    background:rgba(11,9,19,.85);backdrop-filter:blur(10px);
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .modal{
    max-width:440px;width:100%;padding:36px 32px;
    background:var(--bg-1);border:1px solid var(--border);
    border-radius:24px;
    box-shadow:0 40px 80px rgba(0,0,0,.5);
  }
  .modal h2{font-size:22px;font-weight:800;margin-bottom:8px;letter-spacing:-0.04em;}
  .modal p{color:var(--text-dim);font-size:13px;line-height:1.6;margin-bottom:24px;}
  .modal label{display:block;font-size:12px;font-weight:700;margin-bottom:8px;color:var(--text-dim);}
  .modal input,.modal select{
    width:100%;padding:14px 16px;border-radius:12px;
    background:var(--card);border:1px solid var(--border);
    color:var(--text);font-family:inherit;font-size:14px;
    margin-bottom:16px;outline:none;transition:border .2s;
  }
  .modal input:focus,.modal select:focus{border-color:var(--cyan);}
  .modal .start{
    width:100%;padding:16px;border-radius:12px;
    background:linear-gradient(90deg,var(--purple-bright),var(--cyan),var(--mint));
    color:#0B0913;font-weight:800;font-size:15px;
    transition:transform .15s;
  }
  .modal .start:hover{transform:translateY(-1px);}
  .modal .note{
    margin-top:16px;padding:12px;border-radius:10px;
    font-size:11px;color:var(--text-dim);line-height:1.6;
    background:rgba(255,255,255,.03);border:1px solid var(--border);
  }
  .modal .note a{color:var(--cyan);}

  .err{
    margin:0 20px 10px;padding:10px 14px;
    background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.3);
    color:#FF9999;border-radius:10px;font-size:12px;
  }
</style>
</head>

<div class="app">
  <div class="chat-header">
    <a href="index.html" class="back">←</a>
    <div class="avatar">AI</div>
    <div class="h-title">
      <div class="name">AI 상담 어시스턴트 <span class="dot"></span></div>
      <div class="sub">웰컴법률사무소 · 양홍수 변호사 사무소</div>
    </div>
    <button class="settings" id="resetBtn">재시작</button>
  </div>

  <div class="disclaimer">
    ⓘ 저는 AI 어시스턴트이며 변호사가 아닙니다. 법률 자문을 드리지 않고 사실관계만 수집합니다. 최종 판단은 양홍수 변호사가 직접 검토 후 안내드립니다.

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </form>

<script>
const SYSTEM_PROMPT = `당신은 웰컴법률사무소(대표변호사 양홍수)의 개인회생 AI 진단 상담원입니다.
의뢰인의 사실관계를 대화로 수집하여 변제금을 개략 추정하고, 케이스를 Lite / Pro / HOT 로 분류해
양홍수 변호사 상담으로 연결하는 역할을 합니다. 당신은 변호사가 아니며, 법률 자문을 하지 않습니다.

# 사무소 정보
- 양홍수 대표변호사 — 대한변협 인증 도산법·조세법 전문, 변호사·세무사 동시자격
- 회생상담 누적 9,000건+ (2026.3 기준), 서울지방국세청 송무국 경험
- 주소: 서울 서초구 강남대로 525 세영제이타워 10층 (논현역 도보 1분)
- 대표번호: 1551-8016

# 웰컴회생 상품 (중간 없음)
## Lite — 단순·빠름·저가 (착수금 20만원, 잔금 6~12개월 분납)
직장인·무담보·단순 케이스. 100% 비대면. 표준화 프로세스로 비용 압축. 당일 추심 중지.

## Pro — 복잡·깊음 (양홍수 변호사 직접 전담)
일반회생/법인회생/ARS/법인파산+대표 개인회생 동시/세금 채권 편입/전문직 면허 유지 설계.
다른 사무소에서 거절·기각된 복잡 케이스 재검토.

# 2026년 기본생계비 (기준 중위소득 60%, 매년 1월 갱신)
- 1인: 약 1,538,543원
- 2인: 약 2,519,575원
- 3인: 약 3,215,422원
- 4인: 약 3,896,843원
- 5인: 약 4,534,031원
- 6인: 약 5,133,571원

# 변제금 결정 3원칙 (법원이 정하는 총 변제금 = 셋 중 최댓값)
1. 가용소득 기준: (월소득 − 기본생계비 − 추가생계비 − 기타생계비) × 36개월
2. 청산가치 보장: 총 변제금 ≥ (재산 − 면제재산 − 담보채권)
3. 최저변제액 원칙

# 추가생계비 인정 가능 항목 (설명 시 단정 금지)
- **주거비**: 월세·주담대 이자·전세대출 이자·관리비 (4권역 차등, 서울회생법원 한도)
- **교육비**: 미성년 자녀 1인당 약 20만원, 특수교육 50만원+
- **의료비**: 지속적 본인·가족 의료비 (중위소득 60% 초과분부터)
- **부양가족**: 배우자(소득 100만원 이하)·무소득 성년자녀·65세 이상 부모(부양 정황)

# 대화 원칙 (엄격 준수)
1. 반드시 존댓말, "선생님" 호칭
2. **한 번에 질문 1~2개만**. 설문지처럼 쏟아내지 마세요
3. 첫 메시지: 짧은 자기소개 + 면책 고지 + 따뜻한 열린 질문
4. 답변 받으면 먼저 짧게 공감/확인 → 후속 질문
5. 힘들어 보이면 사실 질문 전에 감정 공감 먼저
6. 모든 금액·비율은 반드시 구간·추정 표현 사용 ("약 ○○만 ~ ○○만원", "약 ○○%", "개략", "추정")
7. 숫자는 구간으로 받아도 됩니다 ("대략 5천 정도" OK)
8. 이모지 최소 (1턴 1개 이하), 3~5문장 이내 간결
9. **채무·연체·사치성 소비에 대한 비판·놀람·비난 절대 금지**

# 금지 표현 (절대 사용 금지)
- "회생 가능합니다", "○○하면 됩니다", "탕감 100% 가능"
- "월 60만원입니다" 같은 단정 금액
- "승소 보장", "100% 인가", "최저가"

# 권장 표현
- "회생 신청 자격 검토가 필요해요"
- "이 부분은 변호사 검토가 필요한 부분이에요"
- "월 약 60만~80만원 구간으로 개략 추정돼요"
- "관할 법원·회생위원 판단에 따라 달라질 수 있어요"

# 수집 항목 (자연스럽게 순차 — 답변에 따라 순서 조절)

## ★ 중요: STEP 1 값은 이미 받았습니다
의뢰인이 이 대화 직전에 탭탭탭 형식(tap.html)으로 **거주 권역 / 가구원 수 / 월 소득 / 무담보·담보·세금 채무 / 연체 단계**를 이미 입력하고 왔습니다.
첫 user 메시지에 "[STEP 1 탭탭탭 입력값]" 블록으로 전달됩니다. **이 7개 항목은 절대 다시 묻지 마세요.**

## ★ 첫 답변 템플릿 (반드시 이 순서로)

1) **인사 + 탭탭 결과 받았다는 확인** (1~2문장)
   예) "안녕하세요 선생님, 탭탭으로 입력해 주신 정보 확인했어요."

2) **입력값 점검 블록** — 받은 값을 그대로 다시 정리해서 보여주며 맞는지 확인:
   "현재 이렇게 눌러주셨는데 내용이 맞는지 한 번 점검할게요:

   • 거주 권역: (값)
   • 가구원 수: (값)
   • 월 실수령 소득: (값)
   • 무담보 채무: (값)
   • 담보 채무: (값)
   • 세금 체납: (값)
   • 연체 단계: (값)"

3) **1차 추정 요약 1~2줄**
   예) "이 정보로 개략 추정해보면 월 약 ○○~○○만원 구간, 탕감률 약 ○~○%로 보여요. 추가생계비·재산·부양가족을 반영하면 **더 낮출 여지**가 있어 보이고요."

4) **면책 한 줄**
   "본 진단은 AI 추정이며 법률 자문이 아닙니다. 정확한 전략은 양홍수 변호사 검토가 필요해요."

5) **확인 질문**
   "혹시 위에 빠뜨리거나 수정할 부분이 있을까요? 맞으시면 '맞아요'라고 답해주시면 추가 확인 항목으로 넘어갈게요."

→ 사용자가 "맞아요/맞습니다/네" 등으로 확인하면 그때 **정밀화 체크박스 묶음(A~E)**을 제시합니다.
→ 수정 요청이 있으면 해당 항목만 반영 후 다시 확인한 뒤 A~E로 진행.

**절대 금지**: "몇 인 가구세요?" / "월 소득이 얼마세요?" / "어디 사세요?" 같은 이미 받은 값 재질문.

## 정밀화 체크박스 묶음 (사용자 확인 후 제시)

★ 출력 형식 엄격 준수 — UI가 □ 마커를 실제 클릭 가능한 체크박스로 변환합니다.
- 각 체크 항목은 반드시 **줄 시작에 "□ " 를 붙이고 그 뒤에 라벨**만 적습니다 (□ 앞에 다른 문자 금지)
- 체크 항목 줄에는 **그 외 텍스트·설명·bold 금지** (오직 "□ 라벨" 한 줄)
- 그룹 헤더([A] 추가생계비 등)는 체크박스가 아니라 일반 텍스트로 적습니다
- 5개 그룹을 한 메시지에 모두 한꺼번에 제시합니다

정확히 아래 형식으로 출력하세요:

감사합니다 선생님. 그럼 변제금을 더 낮출 수 있는 항목들을 확인해볼게요.

아래 항목 중 해당되는 것만 체크 부탁드립니다. 선택 완료 후 아래 버튼을 눌러주세요.

[A] 추가생계비
□ 월세 또는 주택담보대출 이자 납부 중
□ 미성년 자녀 있음
□ 부양가족 있음 (배우자·성년자녀·부모님)
□ 정기적인 의료비 지출
□ 자녀 교육비 지출

[B] 직업·소득
□ 전문직 (의사·변호사·세무사·약사 등)
□ 법인 대표 또는 임원
□ 자영업 (매출 변동 있음)
□ 4대보험 미가입 상태

[C] 재산
□ 부동산 보유 (아파트·주택·토지 등)
□ 자동차 보유
□ 금융자산 1천만원 이상
□ 가족 명의 재산 있음

[D] 채무 구조
□ 사채·대부업체 채무 있음
□ 보증인이 있는 채무
□ 본인이 다른 사람 보증

[E] 이력
□ 과거 회생·파산 경험
□ 최근 1년 내 큰 대출
□ 도박·코인 손실
□ 퇴직금 중간정산 받음
□ 명의신탁·차명거래

사용자가 체크박스 UI로 "체크한 항목: ..." 형식의 답을 보내면, 그 항목들에 대해 후속 질문을 1~2개씩만 자연스럽게 진행합니다.

# 분류별 마지막 멘트
- **Lite**: "선생님 케이스는 비교적 단순한 구조로 보여요. 웰컴회생 Lite로 빠르게 진행하는 것이 유리해 보입니다. 양홍수 변호사가 24시간 이내에 직접 검토 후 연락드리겠습니다."
- **Pro**: "선생님 케이스는 변제금을 더 낮출 여지가 있어 보여요. 양홍수 변호사가 직접 설계하는 Pro로 정밀 전략 검토가 필요해 보입니다. 24시간 이내 변호사가 직접 연락드리겠습니다."
- **HOT**: "선생님 상황이 시급해 보여요. 빠른 대응이 변제금·인가에 큰 영향을 줍니다. 양홍수 변호사가 30분 이내 직접 연락드리도록 긴급 전달하겠습니다. 더 급하시면 1551-8016으로 먼저 연락 주셔도 됩니다."

# 면책 문구 (첫 메시지 + 결과 제시 시 반드시 포함)
"본 진단은 AI가 입력 정보 기반으로 추정한 개략 금액이며 법률 자문이 아닙니다. 실제 변제금·탕감률은 관할 법원·회생위원 판단, 추가 자료 검토, 채권자 이의 등에 따라 달라질 수 있습니다. 정확한 전략은 양홍수 변호사 검토가 필요합니다."`;

const DEFAULT_MODEL = 'claude-sonnet-4-5';
const STORAGE_MSGS = 'welcome_rehab_msgs';

let model = DEFAULT_MODEL;
let messages = JSON.parse(localStorage.getItem(STORAGE_MSGS) || '[]');
let isBusy = false;

const $ = (id) => document.getElementById(id);
const messagesEl = $('messages');
const errBox = $('errBox');

function saveMsgs(){ localStorage.setItem(STORAGE_MSGS, JSON.stringify(messages)); }

function escapeHTML(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderMarkdown(text){
  const parts = text.split(/(```[\s\S]*?```)/g);
  return parts.map(p => {
    if(p.startsWith('```')){
      const body = p.replace(/^```(\w+)?\n?/,'').replace(/```$/,'');
      return '<pre>' + escapeHTML(body) + '</pre>';
    }
    return escapeHTML(p)
      .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
      .replace(/\n/g,'<br>');
  }).join('');
}

function render(){
  messagesEl.innerHTML = '';
  const visible = messages.filter(m => !m._hidden);
  visible.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'msg ' + (m.role === 'user' ? 'user' : 'bot');
    const avatar = m.role === 'assistant' ? '<div class="mini-avatar">AI</div>' : '';
    div.innerHTML = avatar + '<div class="bubble">' + renderMarkdown(m.content) + '</div>';
    messagesEl.appendChild(div);
  });
  if(isBusy){
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = '<div class="mini-avatar">AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    messagesEl.appendChild(div);
  }

  // Enhance last assistant bubble with interactive checkboxes if it contains □
  if(!isBusy) enhanceLastCheckboxes();

  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function enhanceLastCheckboxes(){
  const bots = messagesEl.querySelectorAll('.msg.bot .bubble');
  if(bots.length === 0) return;
  const bubble = bots[bots.length - 1];
  if(bubble.dataset.enhanced) return;
  if(!bubble.innerHTML.includes('□')) return;
  bubble.dataset.enhanced = '1';

  // Split by <br> and convert □ lines
  const lines = bubble.innerHTML.split('<br>');
  let cbIdx = 0;
  const out = lines.map(line => {
    // Strip leading whitespace + □ marker (both half/full-width variants)
    const m = line.match(/^\s*(?:□|☐|\[\s*\])\s*(.+)$/);
    if(m){
      const label = m[1].trim();
      // Strip any trailing html tags cleanly — keep label as is
      const id = 'cb_' + Date.now() + '_' + (cbIdx++);
      // Encode label for attribute
      const attrLabel = label.replace(/"/g, '&quot;');
      return `<label class="cb-item" for="${id}"><input type="checkbox" id="${id}" data-label="${attrLabel}"><span>${label}</span></label>`;
    }
    return line;
  });

  bubble.innerHTML = out.join('');

  // Attach change handlers for visual toggle
  bubble.querySelectorAll('.cb-item input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      cb.closest('.cb-item').classList.toggle('checked', cb.checked);
    });
  });

  // Add submit button
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'cb-submit';
  btn.textContent = '선택 완료 → 제출';
  btn.onclick = async () => {
    const checked = [...bubble.querySelectorAll('input[type=checkbox]:checked')];
    // Disable everything
    bubble.querySelectorAll('.cb-item').forEach(el => el.classList.add('disabled'));
    bubble.querySelectorAll('input[type=checkbox]').forEach(el => el.disabled = true);
    btn.disabled = true;
    btn.textContent = '제출 완료';

    let text;
    if(checked.length === 0){
      text = '해당되는 항목이 없어요';
    } else {
      const labels = checked.map(c => '• ' + c.dataset.label).join('\n');
      text = '체크한 항목:\n' + labels;
    }
    await sendMessage(text);
  };
  bubble.appendChild(btn);
}

function showErr(msg){
  errBox.innerHTML = '<div class="err">⚠️ ' + escapeHTML(msg) + '</div>';
  setTimeout(() => errBox.innerHTML = '', 6000);
}

async function callClaude(){
  isBusy = true; render();
  try {
    const res = await fetch('/api/chat',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body: JSON.stringify({
        model: model,
        max_tokens: 1500,
        system: SYSTEM_PROMPT,
        messages: messages.map(m => ({role:m.role, content:m.content}))
      })
    });
    const data = await res.json();
    if(data.error){
      showErr(data.error.message || 'API 오류');
      isBusy = false; render();
      return;
    }
    const text = data.content?.map(c => c.text).join('') || '';
    messages.push({role:'assistant', content:text});
    saveMsgs();
  } catch(e){
    showErr('네트워크 오류: ' + e.message);
  }
  isBusy = false; render();
}

async function sendMessage(text){
  if(!text.trim() || isBusy) return;
  messages.push({role:'user', content:text.trim()});
  saveMsgs(); render();
  await callClaude();
}

function parseStep1Ctx(){
  const raw = new URLSearchParams(location.search).get('ctx');
  if(!raw) return null;
  try {
    const decoded = decodeURIComponent(escape(atob(raw)));
    return JSON.parse(decoded);
  } catch(e){
    return null;
  }
}

function formatStep1Block(ctx){
  const REGION = {'1':'1권역(서울)','2':'2권역(수도권 과밀억제·세종·용인·화성)','3':'3권역(광역시)','4':'4권역(그 외)'};
  const INCOME = {'u200':'200만원 미만','200_300':'200~300만원','300_400':'300~400만원','400_500':'400~500만원','500_700':'500~700만원','700p':'700만원 이상'};
  const UNSEC = {'u3000':'3,000만원 이하','3000_5000':'3,000~5,000만원','5000_10000':'5,000만~1억','10000_30000':'1억~3억','30000p':'3억 이상'};
  const SEC = {'none':'없음','u5000':'5,000만원 미만','5000_10000':'5,000만~1억','10000_30000':'1억~3억','30000p':'3억 이상'};
  const TAX = {'none':'없음','u500':'500만원 미만','500_3000':'500~3,000만원','3000p':'3,000만원 이상'};
  const DELINQ = {'normal':'정상(연체 없음)','short':'연체(3개월 이내)','long':'장기연체(3개월+)','lawsuit':'압류·소송 진행 중','court':'법원 서류 받음'};

  const a = ctx.answers || {};
  const r = ctx.result || {};
  return `[STEP 1 탭탭탭 입력값 — 이미 받음, 재질문 금지]
- 거주 권역: ${REGION[a.region] || a.region}
- 가구원 수: ${a.household}인
- 월 실수령 소득: ${INCOME[a.income] || a.income}
- 무담보 채무: ${UNSEC[a.unsecured] || a.unsecured}
- 담보 채무: ${SEC[a.secured] || a.secured}
- 세금 체납: ${TAX[a.tax] || a.tax}
- 연체 단계: ${DELINQ[a.delinquency] || a.delinquency}

[1차 추정 결과 (서버 계산)]
- 월 변제액 추정: 약 ${r.monthly_repayment_min_manwon}~${r.monthly_repayment_max_manwon}만원
- 탕감률 추정: 약 ${r.discharge_rate_min}~${r.discharge_rate_max}%
- 변제기간: ${r.period_months}개월
- HOT 여부: ${r.is_hot ? '예(긴급)' : '아니오'}

[지침]
위 값은 이미 확보했으므로 절대 다시 묻지 말 것. 첫 답변은:
1) 짧은 공감 한 문장
2) STEP 1 추정 요약 1~2줄 + "추가 인정 항목으로 더 낮출 여지가 있다" 언급
3) 면책 문구
4) A~E 체크박스 묶음을 바로 제시
순서로 진행할 것.`;
}

async function kickoff(){
  const ctx = parseStep1Ctx();

  // ctx가 URL에 있으면 항상 새 세션으로 시작 (이전 localStorage 대화 폐기)
  if(ctx){
    messages = [];
    localStorage.removeItem(STORAGE_MSGS);
    messages.push({role:'user', content: formatStep1Block(ctx), _hidden:true});
    saveMsgs();
    // URL에서 ctx 제거 (새로고침 시 루프 방지 없이 그냥 유지해도 됨, 여기선 유지)
    await callClaude();
    return;
  }

  if(messages.length === 0){
    messages.push({role:'user', content:'안녕하세요, 진단 받으러 왔어요.', _hidden:true});
    saveMsgs();
    await callClaude();
  } else {
    render();
  }
}

// Auto-start — API key is configured server-side via ANTHROPIC_API_KEY env var
kickoff();

// Input
const input = $('input');
const sendBtn = $('sendBtn');
const form = $('form');
input.addEventListener('input', () => {
  sendBtn.disabled = !input.value.trim() || isBusy;
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 140) + 'px';
});
input.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    form.requestSubmit();
  }
});
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = input.value;
  input.value = ''; input.style.height = 'auto';
  sendBtn.disabled = true;
  await sendMessage(text);
});

$('resetBtn').onclick = () => {
  if(!confirm('대화를 처음부터 다시 시작할까요?')) return;
  messages = [];
  localStorage.removeItem(STORAGE_MSGS);
  render();
  kickoff();
};
</script>
