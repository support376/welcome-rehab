<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>정밀 AI 진단 · Step 2 · 웰컴법률사무소</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<style>
:root{
  --bg:#FFFFFF; --bg-alt:#F9FAFB; --bg-card:#FFFFFF;
  --text:#14151A; --text-muted:#72767F; --text-dim:#A0A3AA;
  --line:rgba(20,21,26,.08);
  --primary:#093687; --primary-ink:#07447F; --primary-soft:#EEF4FF;
  --danger:#D44D4D; --danger-soft:#FDEEEE;
  --warning:#B87900; --warning-soft:#FFF4DD;
  --success:#147E52; --success-soft:#E6F2EC;
  --radius-sm:6px; --radius-md:10px; --radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  font-weight:400;letter-spacing:-0.015em;line-height:1.6;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  overflow:hidden;
}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

.app{display:flex;flex-direction:column;height:100vh;max-width:820px;margin:0 auto;background:var(--bg);}

/* Header */
.chat-header{
  display:flex;align-items:center;gap:14px;
  padding:14px 20px;border-bottom:1px solid var(--line);
  background:rgba(255,255,255,.96);backdrop-filter:saturate(1.3) blur(8px);
}
.back{
  width:36px;height:36px;border-radius:var(--radius-md);
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-alt);border:1px solid var(--line);
  color:var(--text);font-size:18px;
}
.avatar{
  width:40px;height:40px;border-radius:50%;
  background:var(--primary);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;
}
.h-title{flex:1;min-width:0;}
.h-title .name{font-size:14.5px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--success);}
.h-title .sub{font-size:11.5px;color:var(--text-muted);margin-top:2px;}
.settings{
  padding:8px 12px;border-radius:var(--radius-sm);
  background:var(--bg-alt);border:1px solid var(--line);
  font-size:12px;color:var(--text-muted);font-weight:500;
}

/* Progress */
.progress-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 20px;background:var(--bg-alt);
  border-bottom:1px solid var(--line);
}
.progress-row .p-label{
  font-size:11px;font-weight:700;color:var(--primary);
  letter-spacing:.02em;white-space:nowrap;
}
.progress-row .p-track{
  flex:1;height:5px;border-radius:3px;
  background:rgba(20,21,26,.06);overflow:hidden;
}
.progress-row .p-bar{
  height:100%;border-radius:3px;background:var(--primary);
  transition:width .5s cubic-bezier(.2,.8,.2,1);
}
.progress-row .p-count{
  font-size:11px;color:var(--text-muted);font-weight:600;white-space:nowrap;
}
.finding-row{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:8px 20px 10px;background:var(--bg-alt);
  border-bottom:1px solid var(--line);
  animation:fadeInFind .4s ease-out;
}
@keyframes fadeInFind{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.finding-label{
  font-size:10.5px;font-weight:700;color:var(--text-muted);
  letter-spacing:.06em;white-space:nowrap;text-transform:uppercase;
}
.finding-chips{display:flex;gap:6px;flex-wrap:wrap;}
.finding-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:999px;
  background:var(--primary-soft);color:var(--primary);
  font-size:11.5px;font-weight:600;
}

/* Disclaimer */
.disclaimer{
  margin:12px 20px 0;padding:10px 14px;
  border-radius:var(--radius-md);font-size:12px;line-height:1.55;
  background:var(--warning-soft);color:var(--warning);
}

/* Messages */
.messages{
  flex:1;overflow-y:auto;
  padding:20px;display:flex;flex-direction:column;gap:14px;
  scroll-behavior:smooth;background:var(--bg);
}
.messages::-webkit-scrollbar{width:6px;}
.messages::-webkit-scrollbar-thumb{background:rgba(20,21,26,.12);border-radius:3px;}

.msg{max-width:88%;display:flex;gap:10px;animation:fadeIn .4s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg .bubble{
  padding:14px 18px;border-radius:18px;
  font-size:15px;line-height:1.7;
  word-wrap:break-word;white-space:pre-wrap;
}
.msg.bot .bubble{
  background:var(--bg-alt);border:1px solid var(--line);
  color:var(--text);border-top-left-radius:4px;
}
.msg.user .bubble{
  background:var(--primary);color:#fff;
  font-weight:500;border-top-right-radius:4px;
}
.msg .bubble pre{
  margin-top:10px;padding:12px;border-radius:8px;
  background:rgba(20,21,26,.06);border:1px solid var(--line);
  font-size:11.5px;line-height:1.5;color:var(--text-muted);
  font-family:ui-monospace,'SF Mono',Consolas,monospace;
  overflow-x:auto;white-space:pre;
}
.msg .bubble b{color:var(--primary);font-weight:700;}
.msg.user .bubble b{color:#fff;}
.mini-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:var(--primary);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
}

.typing{display:flex;gap:4px;padding:4px 2px;}
.typing span{
  width:7px;height:7px;border-radius:50%;background:var(--text-dim);
  animation:blink 1.4s infinite;
}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,60%,100%{opacity:.3;}30%{opacity:1;}}

/* Input */
.composer{
  padding:14px 20px 20px;
  border-top:1px solid var(--line);background:var(--bg);
}
.composer form{
  display:flex;gap:10px;align-items:flex-end;
  background:var(--bg-alt);border:1px solid var(--line);
  border-radius:18px;padding:8px 8px 8px 18px;
  transition:border .2s;
}
.composer form:focus-within{border-color:var(--primary);}
.composer textarea{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:inherit;font-size:15px;
  resize:none;max-height:140px;min-height:24px;
  line-height:1.55;padding:8px 0;letter-spacing:-0.01em;
}
.composer textarea::placeholder{color:var(--text-dim);}
.send-btn{
  width:40px;height:40px;border-radius:50%;
  background:var(--primary);color:#fff;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s;
}
.send-btn:disabled{opacity:.35;cursor:not-allowed;}
.send-btn:not(:disabled):hover{background:var(--primary-ink);}
.composer .hint{font-size:11px;color:var(--text-dim);text-align:center;margin-top:8px;}

/* Interactive checkboxes */
.cb-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;margin:4px 0;border-radius:var(--radius-md);
  background:var(--bg-alt);border:1px solid var(--line);
  cursor:pointer;transition:background .15s,border .15s;
  font-size:14.5px;line-height:1.45;color:var(--text);
}
.cb-item:hover{border-color:var(--primary);background:var(--primary-soft);}
.cb-item input[type=checkbox]{
  width:18px;height:18px;flex-shrink:0;accent-color:var(--primary);
  cursor:pointer;margin:0;
}
.cb-item.checked{background:var(--primary-soft);border-color:var(--primary);}
.cb-item.disabled{opacity:.55;pointer-events:none;}
.cb-submit{
  display:block;width:100%;margin-top:14px;padding:14px;
  border-radius:var(--radius-md);font-size:14.5px;font-weight:600;
  background:var(--primary);color:#fff;letter-spacing:-0.01em;
  transition:background .15s;
}
.cb-submit:hover{background:var(--primary-ink);}
.cb-submit:disabled{opacity:.4;cursor:not-allowed;}

/* Final estimate card */
.final-card{
  margin-top:16px;padding:24px;border-radius:var(--radius-lg);
  background:var(--primary-soft);border:1px solid var(--primary);
}
.final-card .f-eye{
  font-size:11px;color:var(--primary);font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;
}
.final-card h3{
  font-size:19px;font-weight:700;letter-spacing:-0.025em;
  margin-bottom:16px;line-height:1.35;color:var(--text);
}
.final-card .f-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:10px 0;border-bottom:1px solid var(--line);
  font-size:13.5px;
}
.final-card .f-row:last-of-type{border-bottom:none;}
.final-card .f-row .k{color:var(--text-muted);}
.final-card .f-row .v{
  font-weight:600;color:var(--text);font-size:15px;letter-spacing:-0.015em;
}
.final-card .f-row .v.hi{color:var(--primary);font-size:17px;font-weight:700;}
.final-card .f-delta{
  margin-top:14px;padding:12px 14px;border-radius:var(--radius-md);
  background:#fff;border:1px solid var(--line);
  font-size:13px;color:var(--text);line-height:1.65;
}
.final-card .f-delta b{color:var(--primary);font-weight:700;}
.final-card .f-factors{
  margin-top:14px;padding:14px;border-radius:var(--radius-md);
  background:#fff;border:1px solid var(--line);
  font-size:13px;color:var(--text-muted);line-height:1.7;
}
.final-card .f-factors .t{color:var(--text);font-weight:700;display:block;margin-bottom:6px;font-size:12px;}
.final-card .f-strengths{
  margin-top:10px;padding:14px;border-radius:var(--radius-md);
  background:var(--success-soft);border:1px solid rgba(20,126,82,.2);
  font-size:13px;color:var(--success);line-height:1.7;
}
.final-card .f-strengths .t{color:var(--success);font-weight:700;display:block;margin-bottom:6px;font-size:12px;}
.final-card .f-disclaim{
  margin-top:14px;font-size:11.5px;color:var(--text-dim);line-height:1.6;
}

/* Inline contact form */
.inline-form{margin-top:14px;display:flex;flex-direction:column;gap:10px;}
.inline-form label{font-size:11.5px;font-weight:600;color:var(--text-muted);}
.inline-form input[type=text],
.inline-form input[type=tel]{
  width:100%;padding:13px 16px;border-radius:var(--radius-md);
  background:#fff;border:1px solid var(--line);
  color:var(--text);font-family:inherit;font-size:15px;
  outline:none;transition:border .15s;letter-spacing:-0.01em;
}
.inline-form input:focus{border-color:var(--primary);}
.inline-form .consent{
  display:flex;gap:10px;align-items:flex-start;
  padding:12px 14px;border-radius:var(--radius-md);
  background:var(--bg-alt);border:1px solid var(--line);
  font-size:12.5px;color:var(--text-muted);line-height:1.55;cursor:pointer;
}
.inline-form .consent input{width:16px;height:16px;margin-top:2px;accent-color:var(--primary);flex-shrink:0;}
.inline-form .consent b{color:var(--text);}
.inline-form .noshow-frame{
  padding:14px 16px;border-radius:var(--radius-md);
  background:var(--primary-soft);
  font-size:12.5px;color:var(--primary-ink);line-height:1.65;
}
.inline-form .noshow-frame b{color:var(--primary);}
.inline-form .fsubmit{
  width:100%;padding:14px;border-radius:var(--radius-md);
  background:var(--primary);color:#fff;font-weight:600;font-size:14.5px;
  transition:background .15s;letter-spacing:-0.01em;
}
.inline-form .fsubmit:hover{background:var(--primary-ink);}
.inline-form .fsubmit:disabled{opacity:.4;cursor:not-allowed;}

/* Status chip */
.status-chip{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:12px;padding:8px 14px;border-radius:999px;
  background:var(--success-soft);color:var(--success);
  font-size:12.5px;font-weight:600;
}
.status-chip.err{background:var(--danger-soft);color:var(--danger);}

/* Slot grid */
.slot-wrap{margin-top:14px;}
.slot-day{margin-bottom:16px;}
.slot-day .day-title{
  font-size:12.5px;font-weight:700;color:var(--primary);
  letter-spacing:-0.01em;margin-bottom:8px;
}
.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.slot-btn{
  padding:12px 10px;border-radius:var(--radius-sm);
  background:#fff;border:1px solid var(--line);
  font-size:13px;font-weight:600;color:var(--text);
  transition:background .15s,border .15s;cursor:pointer;letter-spacing:-0.01em;
}
.slot-btn:hover{background:var(--primary-soft);border-color:var(--primary);color:var(--primary);}
.slot-btn:disabled{opacity:.35;cursor:not-allowed;}
.slot-empty{
  padding:16px;border-radius:var(--radius-md);text-align:center;
  background:var(--bg-alt);border:1px solid var(--line);
  font-size:13px;color:var(--text-muted);
}
@media (max-width:460px){.slot-grid{grid-template-columns:repeat(2,1fr);}}

.err{
  margin:0 20px 10px;padding:10px 14px;
  background:var(--danger-soft);border:1px solid rgba(212,77,77,.3);
  color:var(--danger);border-radius:var(--radius-md);font-size:12.5px;
}
</style>

 * ═══════════════════════════════════════════════════════════════*/
const SYSTEM_PROMPT = `당신은 웰컴법률사무소(대표변호사 양홍수)의 **정밀 AI 진단 상담원**입니다.

# 웰컴의 핵심 포지셔닝 (모든 답변의 근간)
- 탕감 누수는 **상담 현장**에서 발생합니다. 일반 사무실은 상담원이 묻고, 선생님이 말 안 하면 그대로 묻힙니다.
- 웰컴은 이 자리를 **AI의 빈틈없는 질문 + 양홍수 변호사의 최종 검토** 두 겹으로 바꿨습니다.
- AI가 수집까지 잘하는 건 사실이지만, **최종 검토는 반드시 양홍수 변호사 실명 책임**입니다.
- 다른 사무소에서 거절·반려·기각된 복잡 케이스도 웰컴 Pro가 재검토합니다.

이 진단은 양홍수 변호사가 사전 검토 단계에서 실제로 쓰는 툴입니다. 다른 계산기보다 10배 더 깊이 묻는 것은 드러나지 않은 인정 항목을 찾기 위해서입니다.
의뢰인의 사실관계를 대화로 수집하여 변제금을 개략 추정하고, 케이스를 Lite / Pro / HOT 로 분류해
양홍수 변호사 상담으로 연결하는 역할을 합니다. 당신은 변호사가 아니며, 법률 자문을 하지 않습니다.

# 사무소 정보
- 양홍수 대표변호사 — 대한변협 인증 도산법·조세법 전문, 변호사·세무사 동시자격
- 회생상담 누적 9,000건+ (2026.3 기준), 서울지방국세청 송무국 경험
- 주소: 서울 서초구 강남대로 525 세영제이타워 10층 (논현역 도보 1분)
- 대표번호: 1551-8016

# 웰컴회생 상품 (중간 없음)
## Lite — 단순·빠름·저가 (착수금 20만원, 잔금 6~12개월 분납)
직장인·무담보·단순 케이스. 100% 비대면. 표준화 프로세스로 비용 압축. 당일 추심 중지.

## Pro — 복잡·깊음 (양홍수 변호사 직접 전담)
일반회생/법인회생/ARS/법인파산+대표 개인회생 동시/세금 채권 편입/전문직 면허 유지 설계.
다른 사무소에서 거절·기각된 복잡 케이스 재검토.

# 2026년 기본생계비 (기준 중위소득 60%, 매년 1월 갱신)

# 변제금 결정 3원칙 (법원 총 변제금 = 셋 중 최댓값)
1. 가용소득 기준: (월소득 − 기본생계비 − 추가생계비) × 36개월
2. 청산가치 보장: 총 변제금 ≥ (재산 − 면제재산 − 담보채권)
3. 최저변제액 원칙

# 추가생계비 인정 가능 항목
- **주거비**: 월세·주담대 이자·전세대출 이자·관리비 (4권역 차등, 서울회생법원 한도 약 35~70만)
- **교육비**: 미성년 자녀 1인당 약 20만원, 특수교육 50만원+
- **의료비**: 지속적 의료비 (중위소득 60% 초과분부터)
- **부양가족**: 배우자(소득 100만↓)·무소득 성년자녀·65세+ 부모(부양 정황)

# 대화 원칙 (엄격 준수)
1. 반드시 존댓말, "선생님" 호칭
2. **한 번에 질문 1~2개만**. 설문지처럼 쏟아내지 마세요
3. 답변 받으면 먼저 짧게 공감/확인 → 후속 질문
4. 힘들어 보이면 사실 질문 전에 감정 공감 먼저
5. 모든 금액·비율은 반드시 구간·추정 표현 ("약 ○○만 ~ ○○만원", "약 ○○%", "개략", "추정")
6. 숫자는 구간으로 받아도 됩니다 ("대략 5천 정도" OK)
7. 이모지 최소 (1턴 1개 이하), 3~5문장 이내 간결
8. **채무·연체·사치성 소비에 대한 비판·놀람·비난 절대 금지**
9. 선생님이 **"다른 사무실 다녀왔다 · 반려·거절·포기됐다"** 류 언급 시 비판 없이 수용하고, "양홍수 변호사 재검토로 다시 보겠다" 톤으로 응대
10. 모든 대화에서 수집은 AI가 하지만 **최종 판단은 양홍수 변호사**라는 구조를 한 번 이상 환기 (예: "이 부분은 양홍수 변호사 검토가 반드시 필요한 지점이에요")

# 동적 필터 룰 (반드시 적용)

[A] 부양·가족 상황 — 표시 조건
- household === 1 (독신) AND children_minor === 0 → **A 그룹 통째 제거**
- 그 외에는 [A] 표시. 단:
  - children_minor === 0 → "자녀 중 특수교육" 항목 제거
  - household === 1 → "배우자 무소득" 항목 제거 (배우자 없음)

[B] 드러나지 않은 소득·고용 이슈 — 표시 조건
- job_type ∈ {자영업, 프리랜서} → 3개 항목 모두 표시
- job_type === 직장인 (4대보험 가입 직장인) → "4대보험 미가입" 제거, "자영업 매출 변동" 제거. 남은 건 "소득 증빙이 어려운 구조" 만
- job_type === 무직 → B 그룹 통째 제거
- job_type === 전문직/법인대표 → "4대보험 미가입" 제거. 나머지 표시

[C] 추가 재산 · 명의 — 표시 조건
- housing_cost === 'none' (자가·가족집) → "임차보증금 3000만+" 제거
- 그 외 모두 표시

[D] 채무 구조의 복잡성 — 표시 조건
- 무담보 채무 ('unsecured') 가 'none' → D 그룹 통째 제거
- 그 외 모두 표시. 단 "사채·대부업체" 항목은 "(tap 에서 무담보로 합산하셨더라도) 사채·대부업체가 별도로 있음" 으로 라벨 변경 — tap 과 중복 인상 제거

[E] 최근 행위·리스크 — 표시 조건
- "명의신탁·차명거래" 항목은 [C] 의 "가족 명의 재산" 항목과 중복이므로 [E] 에서 **삭제** (한쪽만 묻기)
- 나머지 3개 항목은 항상 표시

# 표시 형식

정확히 아래 형식으로 (필터링 후 남은 그룹·항목만):

그럼 변제금을 더 낮추고, 탕감률을 올릴 수 있는 디테일을 확인할게요.

아래 중 해당되는 항목만 체크 부탁드립니다. 선택 완료 후 아래 버튼을 눌러주세요.

[A] 부양·가족 상황
□ 배우자가 소득이 거의 없거나 일을 못 하고 있음
□ 자녀 중 특수교육·장애 지원이 필요한 경우가 있음
□ 65세 이상 부모님을 부양 중 (동거 여부 무관)

[B] 드러나지 않은 소득·고용 이슈
□ 4대보험 미가입 상태 (현금 수령 또는 계약서 없음)
□ 최근 1년 매출 변동이 큰 자영업·사업자
□ 소득 증빙이 어려운 구조

[C] 추가 재산 · 명의
□ 본인 명의 자동차 보유 중
□ 배우자·부모·자녀 명의지만 실제로 내 자금이 들어간 재산이 있음
□ 임차보증금이 3,000만원 이상

[D] 채무 구조의 복잡성
□ 사채·대부업체 채무가 별도로 있음 (tap 에서 합산해 답하셨더라도)
□ 연대보증인·보증인이 있는 채무가 있음
□ 본인이 다른 사람의 보증인으로 등재되어 있음
□ 금융기관이 아닌 개인에게 빌린 돈이 있음

[E] 최근 행위·리스크
□ 최근 1년 이내 큰 대출·카드 사용이 있었음
□ 도박·코인·주식으로 최근 1~2년 큰 손실을 본 적 있음
□ 퇴직금을 중간정산 받은 적이 있음

해당 없으면 그냥 "선택 완료 → 제출" 버튼만 누르시면 돼요.

#  ★★ 후속 질문 룰 (체크박스 제출 후)
# ═════════════════════════════════════════════

체크된 항목에 대해서만 1~2개씩 자연스럽게 추가 질문합니다.
**한 메시지에 최대 2개 질문.** 선생님을 심문하듯 몰아치지 마세요.

체크 → 후속 질문 매핑:
- A 배우자 무소득 → "배우자 최근 1년 소득은 얼마쯤인가요? (예: 연 100만원 이하인지)"
- A 특수교육 → "월 어느 정도 특수교육비가 나가고 있어요?"
- A 부모 부양 → "부모님께 매월 얼마 정도 드리세요? 동거 여부는요?"
- B 4대보험 미가입 → "소득 입증 자료로 쓸 수 있는 게 뭐가 있을까요? (통장 내역·계약서·거래명세표 등)"
- B 자영업 매출 변동 → "최근 1년 평균 월 매출과 매입(운영비)은 대략 얼마씩이세요?"
- C 자동차 → "차종·연식·시세 구간 말씀해 주세요. 리스·할부 여부도요."
- C 가족 명의 재산 → "어떤 재산이 누구 명의로 되어 있고, 자금 출처는 어디세요?"
- C 임차보증금 → "보증금 얼마인지, 어느 지역 전·월세인지요?"
- D 사채 → "원금 얼마, 이자율 얼마인지요? 차용증이나 계좌이체 내역 있으세요?"
- D 보증인 → "보증인은 누구시고, 보증채무 규모는요?"
- D 본인 보증 → "보증한 주채무자의 상환 상태는 어떤가요?"
- E 최근 대출 → "언제 어떤 대출이었고, 어디에 쓰셨어요?"
- E 도박·코인 손실 → "시기는 언제쯤이고, 손실 규모는 대략 얼마세요?"
- E 퇴직금 중간정산 → "정산 받으신 시점과 금액이 어떻게 되세요?"
(주의: 명의신탁 후속 질문은 C-가족 명의 재산 매핑으로 통합 — E 에서는 묻지 않음)

**답변받을 때마다 공감·확인 1문장 + 후속 질문 1~2개 원칙 유지.**

# 면책 문구 (첫 메시지 + [FINAL_ESTIMATE] + 결과 제시 시 반드시 포함)
"본 진단은 AI가 입력 정보 기반 추정한 개략 금액이며 법률 자문이 아닙니다. 실제 변제금·탕감률은 관할 법원·회생위원 판단, 추가 자료 검토, 채권자 이의 등에 따라 달라질 수 있습니다. 정확한 전략은 양홍수 변호사 검토가 필요합니다."`;

const DEFAULT_MODEL = 'claude-sonnet-4-5';
const STORAGE_MSGS = 'welcome_rehab_msgs';
const STORAGE_STATE = 'welcome_rehab_state';

let model = DEFAULT_MODEL;
let messages = JSON.parse(localStorage.getItem(STORAGE_MSGS) || '[]');
let leadState = JSON.parse(localStorage.getItem(STORAGE_STATE) || '{}');
// leadState shape: { contact, summary, summarySent, booking, finalEstimate, finalEstimateRendered }
let isBusy = false;

const $ = (id) => document.getElementById(id);
const messagesEl = $('messages');
const errBox = $('errBox');
const progressBarEl = $('progressBar');
const progressCountEl = $('progressCount');

function saveMsgs(){ localStorage.setItem(STORAGE_MSGS, JSON.stringify(messages)); }
function saveState(){ localStorage.setItem(STORAGE_STATE, JSON.stringify(leadState)); }

function escapeHTML(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function stripDirectives(text){
  return text
    .replace(/```json[\s\S]*?```/g, '')
    .replace(/\[CONTACT_FORM\]/g, '')
    .replace(/\[TIME_SLOTS\]/g, '')
    .replace(/\[FINAL_ESTIMATE\]/g, '')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

function renderMarkdown(text){
  const parts = text.split(/(```[\s\S]*?```)/g);
  return parts.map(p => {
    if(p.startsWith('```')){
      const body = p.replace(/^```(\w+)?\n?/,'').replace(/```$/,'');
      return '<pre>' + escapeHTML(body) + '</pre>';
    }
    return escapeHTML(p)
      .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
      .replace(/\n/g,'<br>');
  }).join('');
}

/* ──────────────────────────────────────────────────────────────
 *  Step 2 진행률 (5단계)
 *    1. 인사 · Step 1 확인 (10%)
 *    2. 체크박스 제시됨 (30%)
 *    3. 체크박스 제출 후 후속 질문 진행 (55%)
 *    4. [FINAL_ESTIMATE] 카드 렌더됨 (80%)
 *    5. [CONTACT_FORM] 완료 (95%)
 *    6. [TIME_SLOTS] 예약 확정 (100%)
 * ──────────────────────────────────────────────────────────────*/
function computeProgress(){
  if(leadState.booking) return { pct: 100, step: 5 };
  if(leadState.contact) return { pct: 95, step: 5 };
  if(leadState.finalEstimateRendered) return { pct: 80, step: 4 };

  // 체크박스 제출 여부 탐지 (user 메시지에 "체크한 항목:" 또는 "해당되는 항목이 없어요")
  const checklistSubmitted = messages.some(m =>
    m.role === 'user' && (m.content.startsWith('체크한 항목:') || m.content.includes('해당되는 항목이 없어요'))
  );
  if(checklistSubmitted){
    return { pct: 55, step: 3 };
  }

  // 체크박스 마커(□) 가 assistant 메시지에 포함됐는지
  const checklistShown = messages.some(m =>
    m.role === 'assistant' && m.content.includes('□')
  );
  if(checklistShown) return { pct: 30, step: 2 };

  // 첫 assistant 답변 도착
  const hasAssistantReply = messages.filter(m => m.role === 'assistant' && !m._hidden).length >= 2;
  if(hasAssistantReply) return { pct: 15, step: 1 };

  return { pct: 10, step: 1 };
}

function updateProgressBar(){
  const p = computeProgress();
  progressBarEl.style.width = p.pct + '%';
  progressCountEl.textContent = p.step + ' / 5';
}

// 체크박스 제출 내용에서 찾고 있는 카테고리 chip 표시
const FINDING_CATEGORIES = [
  { key: 'A', label: '부양·의료 여지',     keywords: ['배우자', '특수교육', '장애', '65세', '부모님', '부양 중'] },
  { key: 'B', label: '소득·증빙',           keywords: ['4대보험', '매출 변동', '소득 증빙'] },
  { key: 'C', label: '명의 재산 방어',       keywords: ['자동차', '가족', '명의', '임차보증금'] },
  { key: 'D', label: '채무 구조 정밀화',    keywords: ['사채', '대부업', '보증인', '보증채무', '개인에게'] },
  { key: 'E', label: '청산가치·리스크',     keywords: ['큰 대출', '도박', '코인', '중간정산', '명의신탁', '차명'] },
];
function updateFindingChips(){
  const row = $('findingRow');
  const chips = $('findingChips');
  if(!row || !chips) return;
  if(leadState.finalEstimateRendered){ row.style.display = 'none'; return; }

  const submitMsg = [...messages].reverse().find(m =>
    m.role === 'user' && m.content.startsWith('체크한 항목:')
  );
  if(!submitMsg){ row.style.display = 'none'; return; }
  const text = submitMsg.content;
  const matched = FINDING_CATEGORIES.filter(cat =>
    cat.keywords.some(k => text.includes(k))
  );
  if(matched.length === 0){ row.style.display = 'none'; return; }
  row.style.display = 'flex';
  chips.innerHTML = matched.map(cat =>
    `<span class="finding-chip">· ${cat.label}</span>`
  ).join('');
}

/* ──────────────────────────────────────────────────────────────
 *  Render
 * ──────────────────────────────────────────────────────────────*/
function render(){
  messagesEl.innerHTML = '';
  const visible = messages.filter(m => !m._hidden);
  visible.forEach((m) => {
    const div = document.createElement('div');
    div.className = 'msg ' + (m.role === 'user' ? 'user' : 'bot');
    const avatar = m.role === 'assistant' ? '<div class="mini-avatar">AI</div>' : '';
    const body = m.role === 'assistant' ? stripDirectives(m.content) : m.content;
    div.innerHTML = avatar + '<div class="bubble">' + renderMarkdown(body) + '</div>';
    messagesEl.appendChild(div);
  });
  if(isBusy){
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = '<div class="mini-avatar">AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    messagesEl.appendChild(div);
  }

  if(!isBusy){
    enhanceLastCheckboxes();
    enhanceLastMarkers();
    processSummaryAndSend();
  }

  messagesEl.scrollTop = messagesEl.scrollHeight;
  updateProgressBar();
  updateFindingChips();
}

/* ──────────────────────────────────────────────────────────────
 *  Checkbox enhancement (□ → real checkbox)
 * ──────────────────────────────────────────────────────────────*/
function enhanceLastCheckboxes(){
  const bots = messagesEl.querySelectorAll('.msg.bot .bubble');
  if(bots.length === 0) return;
  const bubble = bots[bots.length - 1];
  if(bubble.dataset.enhanced) return;
  if(!bubble.innerHTML.includes('□')) return;
  bubble.dataset.enhanced = '1';

  const lines = bubble.innerHTML.split('<br>');
  let cbIdx = 0;
  const out = lines.map(line => {
    const m = line.match(/^\s*(?:□|☐|\[\s*\])\s*(.+)$/);
    if(m){
      const label = m[1].trim();
      const id = 'cb_' + Date.now() + '_' + (cbIdx++);
      const attrLabel = label.replace(/"/g, '&quot;');
      return `<label class="cb-item" for="${id}"><input type="checkbox" id="${id}" data-label="${attrLabel}"><span>${label}</span></label>`;
    }
    return line;
  });

  bubble.innerHTML = out.join('');

  bubble.querySelectorAll('.cb-item input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      cb.closest('.cb-item').classList.toggle('checked', cb.checked);
    });
  });

  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'cb-submit';
  btn.textContent = '선택 완료 → 제출';
  btn.onclick = async () => {
    const checked = [...bubble.querySelectorAll('input[type=checkbox]:checked')];
    bubble.querySelectorAll('.cb-item').forEach(el => el.classList.add('disabled'));
    bubble.querySelectorAll('input[type=checkbox]').forEach(el => el.disabled = true);
    btn.disabled = true;
    btn.textContent = '제출 완료';

    let text;
    if(checked.length === 0){
      text = '해당되는 항목이 없어요';
    } else {
      const labels = checked.map(c => '• ' + c.dataset.label).join('\n');
      text = '체크한 항목:\n' + labels;
    }
    await sendMessage(text);
  };
  bubble.appendChild(btn);
}

function showErr(msg){

/* ──────────────────────────────────────────────────────────────
 *  Marker handling: FINAL_ESTIMATE, CONTACT_FORM, TIME_SLOTS
 * ──────────────────────────────────────────────────────────────*/
function lastAssistantIdx(){
  for(let i = messages.length - 1; i >= 0; i--){
    if(messages[i].role === 'assistant' && !messages[i]._hidden) return i;
  }
  return -1;
}

function getLastBotBubble(){
  const bots = messagesEl.querySelectorAll('.msg.bot .bubble');
  if(bots.length === 0) return null;
  return bots[bots.length - 1];
}

function enhanceLastMarkers(){
  const idx = lastAssistantIdx();
  if(idx < 0) return;
  const lastMsg = messages[idx];
  const raw = lastMsg.content;
  const bubble = getLastBotBubble();
  if(!bubble || bubble.dataset.markerEnhanced) return;

  if(raw.includes('[CONTACT_FORM]') && !leadState.contact){
    bubble.dataset.markerEnhanced = '1';
    appendContactForm(bubble);
    return;
  }
  if(raw.includes('[TIME_SLOTS]') && !leadState.booking){
    bubble.dataset.markerEnhanced = '1';
    appendSlotGrid(bubble);
    return;
  }
}

function appendContactForm(bubble){
  const form = document.createElement('div');
  form.className = 'inline-form';
  form.innerHTML = `
    <div>
      <label>이름</label>
      <input type="text" id="lf_name" placeholder="홍길동" autocomplete="name"/>
    </div>
    <div>
      <label>휴대폰</label>
      <input type="tel" id="lf_phone" placeholder="010-0000-0000" autocomplete="tel"/>

    <label class="consent">
      <input type="checkbox" id="lf_consent"/>

    </label>
    <button type="button" class="fsubmit" id="lf_submit">상담 예약 단계로 이동 →</button>
  `;

    leadState.contact = { name, phone, consent: true };

    // Disable form

async function appendSlotGrid(bubble){
  const wrap = document.createElement('div');
  wrap.className = 'slot-wrap';
  wrap.innerHTML = '<div class="slot-empty">빈 시간 불러오는 중...</div>';
  bubble.appendChild(wrap);

  let data;
  try {
    const r = await fetch('/api/slots');
    data = await r.json();
  } catch(e){
    wrap.innerHTML = '<div class="slot-empty">시간 정보를 불러오지 못했어요. 잠시 후 다시 시도하거나 1551-8016으로 전화 주세요.</div>';
    return;
  }
  if(data.error || !Array.isArray(data.slots) || data.slots.length === 0){
    wrap.innerHTML = '<div class="slot-empty">예약 가능한 시간이 없어요. 1551-8016으로 전화 주시면 빠르게 안내드리겠습니다.</div>';
    return;
  }

  // Group by date
  const byDay = {};
  data.slots.forEach(s => {
    const d = new Date(s.start);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    (byDay[key] = byDay[key] || []).push(s);
  });

  wrap.innerHTML = '';
  Object.keys(byDay).sort().forEach(key => {
    const day = document.createElement('div');
    day.className = 'slot-day';
    const head = new Date(byDay[key][0].start);
    const dayStr = formatDayHeader(head);
    day.innerHTML = `<div class="day-title">${dayStr}</div><div class="slot-grid"></div>`;
    const grid = day.querySelector('.slot-grid');
    byDay[key].forEach(s => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'slot-btn';
      btn.textContent = formatTimeOnly(new Date(s.start));
      btn.onclick = () => handleSlotClick(s, wrap);
      grid.appendChild(btn);
    });
    wrap.appendChild(day);
  });
}

function formatDayHeader(d){
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}
function formatTimeOnly(d){
  const h = d.getHours();
  const ampm = h < 12 ? '오전' : '오후';
  const h12 = h === 0 ? 12 : (h > 12 ? h-12 : h);
  return `${ampm} ${h12}시`;
}

async function handleSlotClick(slot, wrap){
  // Disable all slot buttons
  wrap.querySelectorAll('.slot-btn').forEach(b => b.disabled = true);
  const chip = document.createElement('div');
  chip.className = 'status-chip';
  chip.textContent = '예약 중...';
  wrap.appendChild(chip);

  try {
    const r = await fetch('/api/book', {
      method:'POST',
      headers:{'content-type':'application/json'},
      body: JSON.stringify({
        contact: leadState.contact,
        summary: leadState.summary || {},
        start: slot.start,
        end: slot.end,
      }),
    });
    const data = await r.json();
    if(!data.ok){
      chip.className = 'status-chip err';
      chip.textContent = data.conflict ? '이미 예약된 시간이에요. 다른 시간 선택해 주세요.' : ('예약 실패: ' + (data.error || '알 수 없는 오류'));
      // Re-enable buttons on failure
      wrap.querySelectorAll('.slot-btn').forEach(b => b.disabled = false);
      return;
    }
    leadState.booking = { start: slot.start, end: slot.end, label: slot.label };
    saveState();
    try { if(window.fbq) fbq('track', 'Schedule'); } catch(e){}
    try { if(window.gtag) gtag('event', 'book_appointment', { method: 'chat_slot' }); } catch(e){}
    chip.textContent = '✓ ' + (data.label || slot.label) + ' 예약 확정';
    const userMsg = `예약 확정: ${slot.label || formatDayHeader(new Date(slot.start)) + ' ' + formatTimeOnly(new Date(slot.start))}`;
    await sendMessage(userMsg);
  } catch(e){
    chip.className = 'status-chip err';
    chip.textContent = '네트워크 오류: ' + e.message;
    wrap.querySelectorAll('.slot-btn').forEach(b => b.disabled = false);
  }
}

/* ---------- Detect JSON summary in assistant message and send to /api/lead ---------- */

function processSummaryAndSend(){
  if(leadState.summarySent) return;
  if(!leadState.contact) return; // need contact first

  // Scan from latest assistant messages for ```json block
  for(let i = messages.length - 1; i >= 0; i--){
    const m = messages[i];
    if(m.role !== 'assistant') continue;
    const match = m.content.match(/```json\s*([\s\S]*?)```/);
    if(!match) continue;
    let summary;
    try { summary = JSON.parse(match[1]); } catch(e){ break; }
    leadState.summary = summary;
    leadState.summarySent = true;
    saveState();

    // Append confirmation chip to last bot bubble
    const bubble = getLastBotBubble();
    if(bubble && !bubble.querySelector('.lead-sent-chip')){
      const chip = document.createElement('div');
      chip.className = 'status-chip lead-sent-chip';
      chip.textContent = '✓ 변호사에게 전달 완료';
      bubble.appendChild(chip);
    }

    // Conversion tracking
    try { if(window.fbq) fbq('track', 'Lead'); } catch(e){}
    try { if(window.gtag) gtag('event', 'generate_lead', { method: 'chat_ai_summary' }); } catch(e){}

    // Fire-and-forget POST
    fetch('/api/lead', {
      method:'POST',
      headers:{'content-type':'application/json'},
      body: JSON.stringify({
        contact: leadState.contact,
        summary,
      }),
    }).catch(() => { /* silent */ });
    break;
  }
}

async function callClaude(){
  isBusy = true; render();
  try {
    const res = await fetch('/api/chat',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body: JSON.stringify({
        model: model,
        max_tokens: 1500,
        system: SYSTEM_PROMPT,
        messages: messages.map(m => ({role:m.role, content:m.content}))
      })
    });
    const data = await res.json();
    if(data.error){
      showErr(data.error.message || 'API 오류');
      isBusy = false; render();
      return;
    }
    const text = data.content?.map(c => c.text).join('') || '';
    messages.push({role:'assistant', content:text});
    saveMsgs();
  } catch(e){
    showErr('네트워크 오류: ' + e.message);
  }
  isBusy = false; render();
}

async function sendMessage(text){
  if(!text.trim() || isBusy) return;
  messages.push({role:'user', content:text.trim()});
  saveMsgs(); render();
  await callClaude();
}

function parseStep1Ctx(){
  const raw = new URLSearchParams(location.search).get('ctx');
  if(!raw) return null;
  try {
    const decoded = decodeURIComponent(escape(atob(raw)));
    return JSON.parse(decoded);
  } catch(e){
    return null;
  }
}

function formatStep1Block(ctx){
  const REGION = {'1':'1권역(서울)','2':'2권역(수도권 과밀억제·세종·용인·화성)','3':'3권역(광역시)','4':'4권역(그 외)'};
  const INCOME = {'u200':'200만원 미만','200_300':'200~300만원','300_400':'300~400만원','400_500':'400~500만원','500_700':'500~700만원','700p':'700만원 이상'};
  const UNSEC = {'u3000':'3,000만원 이하','3000_5000':'3,000~5,000만원','5000_10000':'5,000만~1억','10000_30000':'1억~3억','30000p':'3억 이상'};
  const SEC = {'none':'없음','u5000':'5,000만원 미만','5000_10000':'5,000만~1억','10000_30000':'1억~3억','30000p':'3억 이상'};
  const TAX = {'none':'없음','u500':'500만원 미만','500_3000':'500~3,000만원','3000p':'3,000만원 이상'};
  const DELINQ = {'normal':'정상(연체 없음)','short':'연체(3개월 이내)','long':'장기연체(3개월+)','lawsuit':'압류·소송 진행 중','court':'법원 서류 받음'};

  const a = ctx.answers || {};
  const r = ctx.result || {};
  return `[STEP 1 탭탭탭 입력값 — 이미 받음, 재질문 금지]
- 거주 권역: ${REGION[a.region] || a.region}
- 가구원 수: ${a.household}인
- 월 실수령 소득: ${INCOME[a.income] || a.income}
- 무담보 채무: ${UNSEC[a.unsecured] || a.unsecured}
- 담보 채무: ${SEC[a.secured] || a.secured}
- 세금 체납: ${TAX[a.tax] || a.tax}
- 연체 단계: ${DELINQ[a.delinquency] || a.delinquency}

[1차 추정 결과 (서버 계산)]
- 월 변제액 추정: 약 ${r.monthly_repayment_min_manwon}~${r.monthly_repayment_max_manwon}만원
- 탕감률 추정: 약 ${r.discharge_rate_min}~${r.discharge_rate_max}%
- 변제기간: ${r.period_months}개월
- HOT 여부: ${r.is_hot ? '예(긴급)' : '아니오'}

[지침]
위 값은 이미 확보했으므로 절대 다시 묻지 말 것. 첫 답변은:
1) 짧은 공감 한 문장
2) STEP 1 추정 요약 1~2줄 + "추가 인정 항목으로 더 낮출 여지가 있다" 언급
3) 면책 문구
4) A~E 체크박스 묶음을 바로 제시
순서로 진행할 것.`;
}

const INSTANT_GREETING = '안녕하세요. AI 상담사입니다.\n\n고객님의 탕감액을 최대화 해보겠습니다.\n\n지금부터 상황을 샅샅이 여쭤볼 예정이니, 최대한 자세히 답변해 주실수록 탕감액을 늘리는 데 큰 도움이 됩니다. 사소해 보이는 내용이라도 빠짐없이 말씀해 주세요.';

async function kickoff(){
  const ctx = parseStep1Ctx();

  // ctx가 URL에 있으면 항상 새 세션으로 시작 (이전 localStorage 대화 폐기)
  if(ctx){
    messages = [];
    leadState = {};
    localStorage.removeItem(STORAGE_MSGS);
    localStorage.removeItem(STORAGE_STATE);
    // 인사말을 즉시 렌더 (API 대기 없이)
    messages.push({role:'assistant', content: INSTANT_GREETING});
    messages.push({role:'user', content: formatStep1Block(ctx), _hidden:true});
    saveMsgs();
    render();
    // 이어서 Step1 결과 분석 요청 (백그라운드)
    await callClaude();
    return;
  }

  if(messages.length === 0){
    // 인사말만 즉시 렌더 — API 호출 없이 사용자 입력 대기
    messages.push({role:'assistant', content: INSTANT_GREETING});
    saveMsgs();
    render();
  } else {
    render();
  }
}

// Auto-start — API key is configured server-side via ANTHROPIC_API_KEY env var
kickoff();

// Input
const input = $('input');
const sendBtn = $('sendBtn');
const form = $('form');
input.addEventListener('input', () => {
  sendBtn.disabled = !input.value.trim() || isBusy;
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 140) + 'px';
});
input.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    form.requestSubmit();
  }
});
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = input.value;
  input.value = ''; input.style.height = 'auto';
  sendBtn.disabled = true;
  await sendMessage(text);
});

$('resetBtn').onclick = () => {
  if(!confirm('대화를 처음부터 다시 시작할까요?')) return;
  messages = [];
  leadState = {};
  localStorage.removeItem(STORAGE_MSGS);
  localStorage.removeItem(STORAGE_STATE);
  render();
  kickoff();
};
</script>
