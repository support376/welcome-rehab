<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>정밀 AI 진단 · 웰컴회생</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<style>
:root{
  --bg:#FFFFFF; --bg-alt:#F9FAFB; --bg-card:#FFFFFF;
  --text:#14151A; --text-muted:#72767F; --text-dim:#A0A3AA;
  --line:rgba(20,21,26,.08);
  --line-strong:rgba(20,21,26,.14);
  --primary:#093687; --primary-ink:#07447F; --primary-soft:#EEF4FF;
  --danger:#D44D4D; --danger-soft:#FDEEEE;
  --warning:#B87900; --warning-soft:#FFF4DD;
  --success:#147E52; --success-soft:#E6F2EC;
  --radius-sm:6px; --radius-md:10px; --radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  font-weight:400;letter-spacing:-0.015em;line-height:1.6;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  overflow:hidden;word-break:keep-all;overflow-wrap:break-word;
}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

.app{
  height:100vh;max-width:720px;margin:0 auto;
  display:flex;flex-direction:column;
  padding:24px 24px 32px;overflow-y:auto;background:var(--bg);
}
.app::-webkit-scrollbar{width:6px;}
.app::-webkit-scrollbar-thumb{background:rgba(20,21,26,.12);border-radius:3px;}

/* Header */
.top{display:flex;align-items:center;gap:14px;margin-bottom:28px;flex-shrink:0;}
.back{
  width:40px;height:40px;border-radius:var(--radius-md);
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-alt);border:1px solid var(--line);
  color:var(--text);font-size:20px;flex-shrink:0;
}
.back:disabled{opacity:.35;cursor:not-allowed;}
.progress{
  flex:1;height:6px;border-radius:3px;
  background:rgba(20,21,26,.06);overflow:hidden;
}
.progress-bar{
  height:100%;border-radius:3px;background:var(--primary);
  transition:width .4s cubic-bezier(.2,.8,.2,1);
}
.counter{
  font-size:12px;color:var(--text-muted);font-weight:600;
  min-width:48px;text-align:right;
}

/* Intro screen */
.intro{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  gap:22px;animation:fadeUp .5s cubic-bezier(.2,.8,.2,1);padding:8px 0;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.intro-badge{
  align-self:flex-start;padding:6px 12px;border-radius:999px;
  background:var(--primary-soft);color:var(--primary-ink);
  font-size:12px;font-weight:600;
}
.intro-title{
  font-size:clamp(28px,6vw,36px);font-weight:700;
  letter-spacing:-0.032em;line-height:1.22;color:var(--text);
}
.intro-warning{
  padding:16px 18px;border-radius:var(--radius-md);
  background:var(--warning-soft);color:var(--warning);
  font-size:14px;line-height:1.7;
}
.intro-warning b{color:var(--text);font-weight:600;}
.intro-flow{
  padding:20px;border-radius:var(--radius-lg);
  background:var(--bg-alt);border:1px solid var(--line);
}
.intro-flow .step{display:flex;align-items:flex-start;gap:14px;padding:12px 0;}
.intro-flow .step + .step{border-top:1px solid var(--line);}
.intro-flow .num{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:var(--primary);color:#fff;font-weight:600;font-size:13px;
  display:flex;align-items:center;justify-content:center;
}
.intro-flow .txt{font-size:14px;line-height:1.55;color:var(--text);}
.intro-flow .txt b{color:var(--primary);font-weight:700;}
.intro-flow .txt .dim{color:var(--text-muted);font-size:13px;display:block;margin-top:3px;}
.intro-meta{display:flex;gap:8px;flex-wrap:wrap;}
.intro-meta .chip{
  padding:8px 14px;border-radius:999px;
  background:var(--bg-alt);border:1px solid var(--line);
  font-size:12.5px;color:var(--text-muted);font-weight:500;
}
.intro-meta .chip b{color:var(--text);font-weight:600;}
.intro-cta{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
.intro-cta .cta-primary{
  display:block;padding:17px;border-radius:var(--radius-md);text-align:center;
  background:var(--primary);color:#fff;font-weight:600;font-size:15.5px;
  letter-spacing:-0.01em;transition:background .15s;
}
.intro-cta .cta-primary:hover{background:var(--primary-ink);}
.intro-cta .cta-secondary{
  display:block;padding:14px;border-radius:var(--radius-md);text-align:center;
  background:var(--bg-alt);border:1px solid var(--line);
  font-size:13.5px;color:var(--text-muted);
}
.intro-cta .cta-secondary:hover{background:#F0F1F4;color:var(--text);}

/* Question */
.q-wrap{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  animation:slideIn .45s cubic-bezier(.2,.8,.2,1);
}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.q-label{
  font-size:12px;font-weight:600;color:var(--primary);
  letter-spacing:.02em;margin-bottom:14px;text-transform:uppercase;
}
.q-title{
  font-size:clamp(24px,5vw,30px);font-weight:700;
  letter-spacing:-0.03em;line-height:1.28;margin-bottom:14px;color:var(--text);
}
.q-desc{
  font-size:14.5px;color:var(--text-muted);line-height:1.7;margin-bottom:28px;
}

/* Options */
.options{display:flex;flex-direction:column;gap:10px;}
.opt{
  width:100%;padding:18px 20px;text-align:left;
  border-radius:var(--radius-md);
  background:var(--bg-card);border:1px solid var(--line);
  font-size:15px;font-weight:500;color:var(--text);
  transition:border .15s,background .15s;
  display:flex;justify-content:space-between;align-items:center;gap:12px;
  letter-spacing:-0.01em;
}
.opt:hover{border-color:var(--primary);background:var(--primary-soft);}
.opt .tag{
  font-size:11px;font-weight:600;color:var(--text-muted);
  padding:3px 9px;border-radius:999px;
  background:var(--bg-alt);border:1px solid var(--line);
}
.opt .tag.pro{color:var(--primary);background:var(--primary-soft);border-color:rgba(9,54,135,.25);}
.opt .arrow{color:var(--text-dim);font-size:18px;transition:color .15s,transform .15s;}
.opt:hover .arrow{transform:translateX(3px);color:var(--primary);}

/* Options grid */
.options.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.options.grid .opt{
  flex-direction:column;align-items:center;justify-content:center;
  padding:22px 14px;text-align:center;min-height:88px;
}
.options.grid .opt .arrow{display:none;}
.options.grid .opt .big{
  font-size:22px;font-weight:700;letter-spacing:-0.03em;margin-bottom:4px;color:var(--text);
}
.options.grid .opt .tag{font-size:11.5px;background:none;border:none;padding:0;}

/* Options grid-4 */
.options.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.options.grid-4 .opt{
  flex-direction:column;align-items:center;justify-content:center;
  padding:20px 10px;text-align:center;min-height:80px;
}
.options.grid-4 .opt .arrow{display:none;}
.options.grid-4 .opt .big{
  font-size:20px;font-weight:700;letter-spacing:-0.03em;margin-bottom:2px;color:var(--text);
}
.options.grid-4 .opt .tag{font-size:10.5px;background:none;border:none;padding:0;}

/* Footer hint */
.foot{
  text-align:center;font-size:12px;color:var(--text-dim);
  margin-top:20px;line-height:1.6;
}
.foot b{color:var(--primary);font-weight:600;}

/* Result screen */
.result{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  animation:fadeUp .5s cubic-bezier(.2,.8,.2,1);
}
.result-card{
  padding:28px 24px;border-radius:var(--radius-lg);
  background:var(--bg-card);border:1px solid var(--line);margin-bottom:18px;
}
.result-card .eye{
  font-size:11px;color:var(--primary);font-weight:700;
  letter-spacing:.04em;margin-bottom:10px;text-transform:uppercase;
}
.result-card h2{
  font-size:22px;font-weight:700;letter-spacing:-0.03em;
  margin-bottom:22px;line-height:1.35;
}
.result-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:12px 0;border-bottom:1px solid var(--line);
}
.result-row:last-of-type{border-bottom:none;}
.result-row .label{font-size:13.5px;color:var(--text-muted);}
.result-row .value{
  font-size:17px;font-weight:700;color:var(--primary);letter-spacing:-0.02em;
}
.case-chip{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:12px;padding:6px 12px;border-radius:999px;
  background:var(--primary-soft);color:var(--primary);
  font-size:11px;font-weight:600;
}
.case-chip.lite{background:var(--success-soft);color:var(--success);}
.case-chip.hot{background:var(--danger-soft);color:var(--danger);}
.hot-alert{
  margin-bottom:16px;padding:14px 18px;border-radius:var(--radius-md);
  background:var(--danger-soft);color:var(--danger);
  font-size:13.5px;line-height:1.6;
}
.hot-alert b{color:var(--danger);font-weight:700;}
.value-gap{
  padding:14px 18px;border-radius:var(--radius-md);
  background:var(--primary-soft);color:var(--primary-ink);
  font-size:13.5px;line-height:1.7;margin-bottom:16px;
}
.value-gap b{color:var(--primary);font-weight:700;}
.disclaim{
  padding:14px 18px;border-radius:var(--radius-md);
  background:var(--warning-soft);color:var(--warning);
  font-size:12px;line-height:1.7;margin-bottom:18px;
}
.cta-primary{
  display:block;padding:17px;border-radius:var(--radius-md);text-align:center;
  background:var(--primary);color:#fff;font-weight:600;font-size:15.5px;
  letter-spacing:-0.01em;transition:background .15s;
}
.cta-primary:hover{background:var(--primary-ink);color:#fff;}
.cta-sub{
  display:block;margin-top:10px;text-align:center;
  font-size:12px;color:var(--text-dim);line-height:1.55;
}
.emergency-call{
  margin-top:24px;padding:12px 14px;border-radius:var(--radius-md);
  background:var(--danger-soft);color:var(--danger);
  font-size:12.5px;text-align:center;line-height:1.55;
}
.emergency-call a{color:var(--danger);font-weight:700;}
.emergency-call b{color:var(--danger);}

/* Result — compare + narrative */
.result-hero{margin-bottom:20px;}
.result-hero .eye{
  font-size:11px;color:var(--primary);font-weight:700;
  letter-spacing:.04em;margin-bottom:10px;text-transform:uppercase;
}
.result-hero h2{
  font-size:clamp(22px,5vw,28px);font-weight:700;
  letter-spacing:-0.03em;line-height:1.32;
}
.result-hero h2 .hi{color:var(--primary);}
.compare-grid{
  display:grid;grid-template-columns:1fr auto 1fr;gap:10px;
  align-items:stretch;margin-bottom:20px;
}
.compare-card{
  padding:16px 14px;border-radius:var(--radius-md);
  background:var(--bg-card);border:1px solid var(--line);
  display:flex;flex-direction:column;gap:4px;
}
.compare-card.current{opacity:.55;}
.compare-card.potential{
  background:var(--primary-soft);border-color:var(--primary);
}
.compare-card .tag{
  font-size:10.5px;font-weight:600;color:var(--text-muted);
  letter-spacing:.02em;margin-bottom:6px;text-transform:uppercase;
}
.compare-card.potential .tag{color:var(--primary);}
.compare-card .metric{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;}
.compare-card .metric .k{font-size:11.5px;color:var(--text-muted);}
.compare-card .metric .v{
  font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.02em;
}
.compare-card.potential .metric .v{color:var(--primary);font-size:15.5px;}
.compare-arrow{align-self:center;font-size:20px;color:var(--primary);font-weight:700;}
.value-pitch{
  margin-bottom:22px;padding:20px;border-radius:var(--radius-lg);
  background:var(--bg-alt);border:1px solid var(--line);
}
.value-pitch h3{
  font-size:16px;font-weight:700;color:var(--text);
  margin-bottom:8px;letter-spacing:-0.02em;
}
.value-pitch p{font-size:13.5px;color:var(--text-muted);line-height:1.7;margin-bottom:10px;}
.value-pitch p strong,.value-pitch p b{color:var(--text);font-weight:600;}
.value-pitch ul{list-style:none;margin:0 0 12px;padding:0;}
.value-pitch li{
  font-size:13.5px;color:var(--text);padding:5px 0 5px 22px;
  position:relative;line-height:1.5;
}
.value-pitch li::before{
  content:'✓';position:absolute;left:0;top:5px;color:var(--primary);font-weight:700;
}
.value-pitch .welcome-promise{
  margin-top:14px;padding-top:14px;border-top:1px solid var(--line);
  font-size:13px;color:var(--text-muted);line-height:1.7;
}
.value-pitch .welcome-promise b{color:var(--primary);font-weight:700;}
.disclaim-tiny{
  margin-top:18px;font-size:11.5px;color:var(--text-dim);
  text-align:center;line-height:1.55;
}
.hot-banner{
  margin-bottom:14px;padding:12px 16px;border-radius:var(--radius-md);
  background:var(--danger-soft);color:var(--danger);
  font-size:13px;line-height:1.6;
}
.hot-banner b{color:var(--danger);font-weight:700;}
.emergency-inline{
  margin-top:10px;text-align:center;font-size:12px;color:var(--text-muted);
}
.emergency-inline a{color:var(--danger);font-weight:700;text-decoration:none;}

/* Loading */
.loading{
  flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:20px;
}
.spinner{
  width:44px;height:44px;border-radius:50%;
  border:3px solid rgba(20,21,26,.08);border-top-color:var(--primary);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading p{font-size:14px;color:var(--text-muted);}

@media (max-width:420px){
  .app{padding:20px 18px 28px;}
  .options.grid{grid-template-columns:repeat(3,1fr);gap:8px;}
  .options.grid .opt{min-height:78px;padding:18px 8px;}
  .options.grid .opt .big{font-size:20px;}
  .options.grid-4{grid-template-columns:repeat(4,1fr);gap:6px;}
  .options.grid-4 .opt{min-height:72px;padding:16px 6px;}
  .options.grid-4 .opt .big{font-size:18px;}
}
</style>

<body>

<div class="app">
  <div class="top">
    <button class="back" id="backBtn">←</button>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="counter" id="counter">준비</div>
  </div>

  <div id="stage"></div>
</div>

<script>
/* ──────────────────────────────────────────────────────────────
 *  STEPS — 14개 정량 질문
 *  v2 필드: housing_cost / children_minor / medical_cost / job_type
 *           / real_estate / financial_assets / history_rehab
 * ──────────────────────────────────────────────────────────────*/
const STEPS = [
  {
    key: 'region',
    label: 'STEP 1 · 거주 권역',
    title: '어디에 거주하고 계세요?',
    desc: '지역에 따라 추가 주거비 인정 한도가 달라집니다.',
    layout: 'list',
    options: [
      { v:'1', label:'1권역 · 서울 전역', tag:'서울' },
      { v:'2', label:'2권역 · 수도권 과밀억제권역', tag:'세종·용인·화성 포함' },
      { v:'3', label:'3권역 · 광역시', tag:'부산·대구·광주·대전·울산' },
      { v:'4', label:'4권역 · 그 외 지역', tag:'지방 시·군' },
    ]
  },
  {
    key: 'household',
    label: 'STEP 2 · 실제 부양가족',
    title: '본인이 실제로<br/>부양하는 인원은?',
    desc: '본인 포함, 본인이 실질적으로 생계를 책임지는 인원만 선택하세요.<br/><span style="color:var(--text-dim);font-size:12px;">예) 맞벌이 부부 + 미성년 자녀 2명 → 각자 1명씩 부양하므로 <b>본인 기준 2인</b>.</span>',
    layout: 'grid',
    options: [
      { v:'1', big:'1인', tag:'본인만' },
      { v:'2', big:'2인', tag:'본인 + 1명' },
      { v:'3', big:'3인', tag:'본인 + 2명' },
      { v:'4', big:'4인', tag:'본인 + 3명' },
      { v:'5', big:'5인', tag:'본인 + 4명' },
      { v:'6', big:'6인+', tag:'본인 + 5명↑' },
    ]
  },
  {
    key: 'income',
    label: 'STEP 3 · 월 소득',
    title: '월 실수령 소득은<br/>얼마 정도 되세요?',
    desc: '세후 실제 통장에 들어오는 금액 기준. 구간으로 편하게 선택하세요.',
    layout: 'list',
    options: [
      { v:'u200', label:'200만원 미만' },
      { v:'200_300', label:'200 ~ 300만원' },
      { v:'300_400', label:'300 ~ 400만원' },
      { v:'400_500', label:'400 ~ 500만원' },
      { v:'500_700', label:'500 ~ 700만원' },
      { v:'700p', label:'700만원 이상' },
    ]
  },
  {
    key: 'unsecured',
    label: 'STEP 4 · 무담보 채무',
    title: '무담보 채무는<br/>얼마 정도 되세요?',
    desc: '카드·신용대출·캐피탈·사채 등. 담보 없이 빌린 채무의 합계입니다.',
    layout: 'list',
    options: [
      { v:'u1000',        label:'1,000만원 이하' },
      { v:'1000_2000',    label:'1,000 ~ 2,000만원' },
      { v:'2000_3000',    label:'2,000 ~ 3,000만원' },
      { v:'3000_5000',    label:'3,000 ~ 5,000만원' },
      { v:'5000_7000',    label:'5,000 ~ 7,000만원' },
      { v:'7000_10000',   label:'7,000만 ~ 1억' },
      { v:'10000_15000',  label:'1억 ~ 1.5억' },
      { v:'15000_30000',  label:'1.5억 ~ 3억' },
      { v:'30000p',       label:'3억 이상' },
    ]
  },
  {
    key: 'secured',
    label: 'STEP 5 · 담보 채무',
    title: '담보 채무가 있으세요?',
    desc: '주택담보대출·자동차담보·전세자금담보 등. 없으면 "없음"을 선택하세요.',
    layout: 'list',
    options: [
      { v:'none', label:'없음' },
      { v:'u5000', label:'5,000만원 미만' },
      { v:'5000_10000', label:'5,000만 ~ 1억' },
      { v:'10000_30000', label:'1억 ~ 3억' },
      { v:'30000p', label:'3억 이상' },
    ]
  },
  {

const state = {
  step: 0,
  answers: {},
  result: null,
  mode: 'intro', // 'intro' | 'tap' | 'loading' | 'result'
};

const $ = (id) => document.getElementById(id);
const stage = $('stage');
const progressBar = $('progressBar');
const counter = $('counter');
const backBtn = $('backBtn');

function render(){
  if(state.mode === 'intro'){ renderIntro(); }
  else if(state.mode === 'tap'){ renderTap(); }
  else if(state.mode === 'loading'){ renderLoading(); }
  else if(state.mode === 'result'){ renderResult(); }
  updateProgress();
}

function updateProgress(){
  const total = STEPS.length;
  if(state.mode === 'intro'){
    progressBar.style.width = '0%';
    counter.textContent = '준비';
    backBtn.disabled = true;
    return;
  }
  let done = state.step;
  if(state.mode === 'loading' || state.mode === 'result') done = total;
  progressBar.style.width = (done / total * 100) + '%';
  counter.textContent = (state.mode === 'tap' ? (state.step + 1) : total) + ' / ' + total;
  backBtn.disabled = (state.mode === 'intro') || (state.mode === 'loading');
}

/* ──────────────────────────────────────────────────────────────
 *  Intro screen (Step 0)
 * ──────────────────────────────────────────────────────────────*/
function renderIntro(){
  stage.innerHTML = `
    <div class="intro">
      <div class="intro-badge">⚖ 변호사 검토 AI 진단 툴</div>
      <h1 class="intro-title">다른 계산기보다<br/><span style="color:var(--primary);">10배 더 묻습니다.</span></h1>

      <div class="intro-warning">
        이 진단은 <b>양홍수 변호사가 사전 검토 단계에서 실제로 쓰는 정밀 AI 툴</b>입니다.
        드러나지 않은 인정 항목을 찾는 것이 목적이기 때문에, 가볍게 찍고 지나가면 탕감 이유가 수집되지 않아요. 중간에 나가시면 변호사 검토를 받으실 수 없습니다.
      </div>

      <div class="intro-flow">
        <div class="step">
          <div class="num">1</div>
          <div class="txt">
            <b>정량 입력 · 14개 항목</b>
            <span class="dim">거주·소득·채무·재산·이력까지. 객관식으로 약 2분.</span>
          </div>
        </div>
        <div class="step">
          <div class="num">2</div>
          <div class="txt">
            <b>AI 주관 설문 · 정밀 파악</b>
            <span class="dim">탭으로 잡히지 않는 디테일을 AI가 대화로 확인. 약 3분.</span>
          </div>
        </div>
        <div class="step">
          <div class="num">3</div>
          <div class="txt">
            <b>정밀 추정 + 변호사 연결</b>
            <span class="dim">수집 정보 기반 변제금·탕감률 재계산 → 양홍수 변호사 직접 상담.</span>
          </div>
        </div>
      </div>

      <div class="intro-meta">
        <div class="chip">⏱ <b>총 5분</b> 소요</div>
        <div class="chip">🔒 이름·연락처 <b>미요구</b></div>
        <div class="chip">📋 <b>객관식</b> 중심</div>
      </div>

      <div class="intro-cta">
        <button type="button" class="cta-primary" id="introStartBtn">집중할 수 있어요 · 정밀 진단 시작 →</button>
        <button type="button" class="cta-secondary" id="introLaterBtn">나중에 · 홈으로 돌아가기</button>
      </div>
    </div>
  `;
  document.getElementById('introStartBtn').onclick = () => {
    try { if(window.gtag) gtag('event', 'diagnostic_start', { method: 'tap_intro' }); } catch(e){}
    state.mode = 'tap';
    state.step = 0;
    render();
  };
  document.getElementById('introLaterBtn').onclick = () => {
    location.href = 'index.html';
  };
}

/* ──────────────────────────────────────────────────────────────
 *  Question screen
 * ──────────────────────────────────────────────────────────────*/
function renderTap(){
  const q = STEPS[state.step];
  let layoutClass = 'options';
  if(q.layout === 'grid') layoutClass = 'options grid';
  else if(q.layout === 'grid-4') layoutClass = 'options grid-4';

  const optsHtml = q.options.map(o => {
    if(q.layout === 'grid' || q.layout === 'grid-4'){
      return `<button class="opt" data-v="${o.v}">
        <div class="big">${o.big}</div>
        ${o.tag ? `<div class="tag">${o.tag}</div>` : ''}
      </button>`;
    }
    const tagClass = o.tagClass ? ` ${o.tagClass}` : '';
    return `<button class="opt" data-v="${o.v}">
      <span>${o.label}</span>
      <span style="display:flex;align-items:center;gap:10px;">
        ${o.tag ? `<span class="tag${tagClass}">${o.tag}</span>` : ''}
        <span class="arrow">→</span>
      </span>
    </button>`;
  }).join('');

  stage.innerHTML = `
    <div class="q-wrap">
      <div class="q-label">${q.label}</div>
      <h1 class="q-title">${q.title}</h1>
      <p class="q-desc">${q.desc}</p>
      <div class="${layoutClass}">${optsHtml}</div>
      <div class="foot">
        <b>${state.step + 1} / ${STEPS.length}</b> · 정량 입력 단계
      </div>
    </div>
  `;

  stage.querySelectorAll('.opt').forEach(btn => {
    btn.onclick = () => {
      state.answers[q.key] = btn.dataset.v;
      if(state.step < STEPS.length - 1){
        state.step++;
        render();
      } else {
        submit();
      }
    };
  });
}

function renderLoading(){
  stage.innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p>입력하신 14개 정보로 1차 정밀 추정 중...</p>
    </div>
  `;
}

async function submit(){
  state.mode = 'loading'; render();
  try{
    const res = await fetch('/api/estimate', {
      method:'POST',
      headers:{'content-type':'application/json'},
      body: JSON.stringify(state.answers),
    });
    const data = await res.json();
    state.result = data;
    try { if(window.gtag) gtag('event', 'diagnostic_step1_complete'); } catch(e){}
  } catch(e){
    state.result = { error: e.message };
  }
  state.mode = 'result'; render();
}

/* ──────────────────────────────────────────────────────────────
 *  Result screen — 단일 CTA (AI 상담만이 경로)
 * ──────────────────────────────────────────────────────────────*/
function renderResult(){
  const r = state.result?.result;
  if(!r){
    stage.innerHTML = `<div class="loading"><p>계산 중 오류가 발생했어요. 다시 시도해 주세요.</p></div>`;
    return;
  }

  const ctxRaw = btoa(unescape(encodeURIComponent(JSON.stringify({
    answers: state.answers,
    result: r,
    calc: state.result.calc || {},
    inputs: state.result.inputs || {},
  }))));
  const ctx = encodeURIComponent(ctxRaw);

  // 정밀 진단 후 예상 개선 범위 (경험치 기반 · 구간 표현으로 단정 회피)
  const potentialMonthlyMin = Math.max(r.monthly_repayment_min_manwon - 30, 10);
  const potentialMonthlyMax = Math.max(r.monthly_repayment_max_manwon - 12, 15);
  const potentialRateMin = Math.min(r.discharge_rate_min + 15, 95);
  const potentialRateMax = Math.min(r.discharge_rate_max + 25, 95);

  const hotBanner = r.is_hot ? `
    <div class="hot-banner">
      <b>압류·소송·법원 서류 상황이에요.</b> AI 정밀 진단 끝내시면 변호사가 빠른 대응 플랜을 바로 알려드려요.
    </div>
  ` : '';

  stage.innerHTML = `
    <div class="result">
      ${hotBanner}

      <div class="result-hero">
        <div class="eye">STEP 1 · AI 1차 추정 완료</div>
        <h2>여기까지는 14개 숫자로 계산한 결과예요.<br/><span class="hi">진짜 탕감은 지금부터 AI가 대화로 찾아냅니다.</span></h2>
      </div>

      <div class="compare-grid">
        <div class="compare-card current">
          <div class="tag">여기까지 · Step 1</div>
          <div class="metric"><span class="k">월 변제</span><span class="v">${r.monthly_repayment_min_manwon}~${r.monthly_repayment_max_manwon}만</span></div>
          <div class="metric"><span class="k">탕감률</span><span class="v">${r.discharge_rate_min}~${r.discharge_rate_max}%</span></div>
          <div class="metric"><span class="k">기간</span><span class="v">${r.period_months}개월</span></div>
        </div>
        <div class="compare-card after">
          <div class="tag">AI 정밀 진단 + 변호사 설계 후 예상</div>
          <div class="metric"><span class="k">월 변제</span><span class="v hi">${potentialMonthlyMin}~${potentialMonthlyMax}만</span></div>
          <div class="metric"><span class="k">탕감률</span><span class="v hi">${potentialRateMin}~${potentialRateMax}%</span></div>
          <div class="metric"><span class="k">기간</span><span class="v hi">36개월 목표</span></div>
          <div class="note">추가생계비·청산가치 방어·세금 채권 편입 등 AI 대화로 끝까지 끌어냅니다.</div>
        </div>
      </div>

      <div class="next-cta">
        <a class="cta-primary" href="chat.html?ctx=${ctx}">AI와 심층 상담 시작 →</a>
        <div class="cta-note">이름·연락처 없이 시작 · 대화 내내 숨은 탕감 포인트를 찾아드려요.</div>
      </div>

      <div class="trust-row">
        <div class="trust-item"><strong>양홍수 변호사</strong> · 대한변협 도산·조세법 전문</div>
        <div class="trust-item">변호사 · 세무사 <strong>복수 자격</strong></div>
        <div class="trust-item">상담 약속금 <strong>2만원</strong> · 상담 완료 시 전액 환불</div>
      </div>
    </div>
  `;
}

/* ──────────────────────────────────────────────────────────────
 *  Router
 * ──────────────────────────────────────────────────────────────*/
function render(){
  if(state.mode === 'intro') renderIntro();
  else if(state.mode === 'result') renderResult();
  else renderStep();
  updateProgress();
}

function updateProgress(){
  let pct;
  if(state.mode === 'intro') pct = 0;
  else if(state.mode === 'result') pct = 100;
  else pct = Math.round(((state.step + 1) / STEPS.length) * 100);
  progressBar.style.width = pct + '%';
  counter.textContent = state.mode === 'intro'
    ? '시작'
    : state.mode === 'result'
      ? '완료'
      : `${state.step + 1} / ${STEPS.length}`;
  backBtn.disabled = (state.mode === 'intro');
}

backBtn.addEventListener('click', () => {
  if(state.mode === 'result'){
    state.mode = 'step'; state.step = STEPS.length - 1;
    render(); return;
  }
  if(state.mode === 'step'){
    if(state.step === 0){ state.mode = 'intro'; }
    else { state.step -= 1; }
    render();
  }
});

render();
</script>
